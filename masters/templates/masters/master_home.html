{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

        <div class="card-header bg-primary text-white">

            <h2 class="mb-0">
                Masters Module
            </h2>

        </div>

        <div class="card-body">

            <p class="mb-4">
                Select a Master to manage.
            </p>

            <div class="list-group">

                <a href="{% url 'shop_list' %}"
                   class="list-group-item list-group-item-action">

                    🏭 Shop Master

                </a>

                <a href="{% url 'equipment_list' %}"
                   class="list-group-item list-group-item-action">

                </a>

                <a href="{% url 'subequipment_list' %}"
                   class="list-group-item list-group-item-action">

                    🔩 Sub Equipment Master

                </a>

                <a href="{% url 'agency_list' %}"
                   class="list-group-item list-group-item-action">

                    👷 Agency Master

                </a>

            </div>

            <hr>

            <a href="{% url 'dashboard' %}"

                ← Back to Dashboard

            </a>

    </div>

</div>

{% endblock %}
