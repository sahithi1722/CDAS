{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-secondary text-white">

            <h3>

                {% if agency %}

                    Edit Agency

                {% else %}

                    Add Agency

                {% endif %}

            </h3>

        </div>

        <div class="card-body">

            {% if error %}

                <div class="alert alert-danger">

                    {{ error }}

                </div>

            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Agency Name

                    </label>

                    <input
                        type="text"
                        name="agency_name"
                        class="form-control"
                        value="{{ agency.agency_name|default:'' }}"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    {% if agency %}

                        Update Agency

                    {% else %}

                        Save Agency

                    {% endif %}

                </button>

                <a href="{% url 'agency_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
