{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Equipment Wise Report</h3>

</div>

<div class="card-body">

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>Equipment</th>

<th>Total Delays</th>

</tr>

</thead>

<tbody>

{% for r in report %}

<tr>

<td>{{ r.equipment__eqpt_desc }}</td>

<td>{{ r.total }}</td>

</tr>

{% empty %}

<tr>

<td colspan="2" class="text-center">

No Records Found

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

{% endblock %}
