{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card">

<div class="card-header bg-dark text-white">

<h4>Delay Audit History</h4>

</div>

<div class="card-body">

<table class="table table-bordered table-striped">

<thead>

<tr>
    <th>Action</th>
    <th>User</th>
    <th>Remarks</th>
    <th>Date & Time</th>
</tr>

</thead>

<tbody>

{% for h in history %}

<tr>

<td>{{ h.action }}</td>

<td>{{ h.user }}</td>

<td>{{ h.remarks }}</td>

<td>{{ h.action_date|date:"d-M-Y H:i" }}</td>

</tr>

{% empty %}

<tr>

<td colspan="4" class="text-center">

No history available.

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

{% endblock %}
