{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-header">

            <h3>
                {% if equipment %}
                    Edit Equipment
                {% else %}
                    Add Equipment
                {% endif %}
            </h3>

        </div>

        <div class="card-body">

            {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">

                        Shop

                    </label>

                    <select
                        name="shop"
                        class="form-select"
                        required>

                        {% for shop in shops %}

                        <option
                            value="{{ shop.id }}"
                            {% if equipment and equipment.shop.id == shop.id %}
                                selected
                            {% endif %}>

                            {{ shop.shop_desc }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Equipment Code

                    </label>

                    <input
                        type="text"
                        name="eqpt_code"
                        class="form-control"
                        value="{{ equipment.eqpt_code|default:'' }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Equipment Description

                    </label>

                    <input
                        type="text"
                        name="eqpt_desc"
                        class="form-control"
                        value="{{ equipment.eqpt_desc|default:'' }}"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    {% if equipment %}
                        Update Equipment
                    {% else %}
                        Save Equipment
                    {% endif %}

                </button>

                <a href="{% url 'equipment_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
